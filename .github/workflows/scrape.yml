name: Scrape Lowlands ticket prices

on:
  # Uitgeschakeld: Ticketmaster herkent de headless Playwright-browser als bot
  # en levert dan geen listings, ongeacht frequentie of IP. De Tampermonkey-
  # userscript (zie tampermonkey/) is nu de primaire databron. Deze workflow
  # blijft als handmatige noodgreep staan, mocht dat ooit weer werken.
  workflow_dispatch: {}

concurrency:
  group: scrape-lowlands
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: npm run scrape

      - name: Commit updated data
        run: |
          git config user.name "lowlands-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --quiet --cached || git commit -m "Update ticket price data"
          git pull --rebase origin main
          git push
