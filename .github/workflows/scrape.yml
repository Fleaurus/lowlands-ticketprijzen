name: Scrape Lowlands ticket prices

on:
  schedule:
    # Elke 15 minuten. Pas de cron-expressie aan voor een andere frequentie.
    - cron: '*/15 * * * *'
  workflow_dispatch: {} # laat je 'm ook handmatig starten via de Actions-tab

concurrency:
  group: scrape-lowlands
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: npm run scrape

      - name: Commit updated data
        run: |
          git config user.name "lowlands-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          git diff --quiet --cached || git commit -m "Update ticket price data"
          git pull --rebase origin main
          git push
